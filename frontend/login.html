<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>鐧诲綍 - 浼佷笟绠＄悊绯荤粺</title>
  <link rel="stylesheet" href="common.v2.css" />
  <style>
    /* 鐧诲綍椤典笓鐢ㄦ牱寮?*/
    .login-page {
      min-height: 100vh;
      display: flex;
      background: linear-gradient(135deg, #0F172A 0%, #1E293B 50%, #0F172A 100%);
      position: relative;
      overflow: hidden;
    }

    /* 鑳屾櫙瑁呴グ */
    .login-bg {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      overflow: hidden;
    }
    .login-bg::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 30% 20%, rgba(59, 130, 246, 0.15) 0%, transparent 50%),
                  radial-gradient(circle at 70% 80%, rgba(139, 92, 246, 0.1) 0%, transparent 50%);
      animation: bgRotate 30s linear infinite;
    }
    @keyframes bgRotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* 宸︿晶鍝佺墝鍖?*/
    .login-brand {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 60px;
      position: relative;
      z-index: 1;
    }
    .brand-logo {
      width: 120px;
      height: 120px;
      border-radius: 24px;
      background: linear-gradient(135deg, var(--primary), #60A5FA);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 20px 60px rgba(59, 130, 246, 0.4);
      margin-bottom: 40px;
    }
    .brand-logo-icon {
      width: 60px;
      height: 60px;
      background: #fff;
      border-radius: 8px;
      position: relative;
    }
    .brand-logo-icon::before {
      content: '';
      position: absolute;
      top: 10px;
      left: 15px;
      width: 30px;
      height: 20px;
      border: 3px solid var(--primary-dark);
      border-bottom: none;
    }
    .brand-title {
      font-size: 42px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 16px;
      text-align: center;
    }
    .brand-subtitle {
      font-size: 18px;
      color: var(--muted);
      text-align: center;
      max-width: 400px;
      line-height: 1.6;
    }
    .brand-features {
      display: flex;
      gap: 40px;
      margin-top: 60px;
    }
    .brand-feature {
      text-align: center;
    }
    .brand-feature-icon {
      font-size: 32px;
      margin-bottom: 12px;
    }
    .brand-feature-text {
      font-size: 14px;
      color: var(--muted);
    }

    /* 鍙充晶鐧诲綍鍖?*/
    .login-form-wrap {
      width: 480px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 60px;
      position: relative;
      z-index: 1;
    }
    .login-card {
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
    }
    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }
    .login-title {
      font-size: 24px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 8px;
    }
    .login-subtitle {
      font-size: 14px;
      color: var(--muted);
    }

    /* 鐧诲綍鏂瑰紡鍒囨崲 */
    .login-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      padding: 4px;
      background: var(--bg);
      border-radius: 10px;
    }
    .login-tab {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: transparent;
      color: var(--muted);
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .login-tab:hover {
      color: var(--text);
    }
    .login-tab.active {
      background: var(--primary);
      color: #fff;
    }

    /* 鐧诲綍鍐呭鍖?*/
    .login-content {
      display: none;
    }
    .login-content.active {
      display: block;
    }

    /* 琛ㄥ崟鏍峰紡 */
    .login-form .form-group {
      margin-bottom: 20px;
    }
    .login-form .form-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .login-form .form-input {
      width: 100%;
      height: 48px;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0 16px;
      font-size: 15px;
      background: var(--bg);
      color: var(--text);
      outline: none;
      transition: all 0.2s;
    }
    .login-form .form-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-light);
    }
    .login-form .form-input.error {
      border-color: var(--danger);
      box-shadow: 0 0 0 3px rgba(248, 113, 113, 0.2);
    }
    .login-form .form-input:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* 瀵嗙爜杈撳叆妗?*/
    .password-wrap {
      position: relative;
    }
    .password-toggle {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 18px;
      padding: 4px;
    }
    .password-toggle:hover {
      color: var(--text);
    }

    /* 璁颁綇瀵嗙爜 & 蹇樿瀵嗙爜 */
    .login-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }
    .remember-me {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--muted);
      cursor: pointer;
    }
    .remember-me input {
      width: 16px;
      height: 16px;
      cursor: pointer;
    }
    .forgot-password {
      font-size: 13px;
      color: var(--primary);
      text-decoration: none;
    }
    .forgot-password:hover {
      text-decoration: underline;
    }

    /* 鐧诲綍鎸夐挳 */
    .login-btn {
      width: 100%;
      height: 48px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #fff;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .login-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(59, 130, 246, 0.4);
    }
    .login-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .login-btn .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* 閿欒鎻愮ず */
    .error-message {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      background: rgba(248, 113, 113, 0.1);
      border: 1px solid rgba(248, 113, 113, 0.3);
      border-radius: 8px;
      color: var(--danger);
      font-size: 13px;
      margin-bottom: 16px;
    }
    .error-message.show {
      display: flex;
    }

    /* 閿佸畾鎻愮ず */
    .lock-message {
      display: none;
      text-align: center;
      padding: 24px;
      background: rgba(245, 158, 11, 0.1);
      border: 1px solid rgba(245, 158, 11, 0.3);
      border-radius: 10px;
      margin-bottom: 16px;
    }
    .lock-message.show {
      display: block;
    }
    .lock-message-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
    .lock-message-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--warning);
      margin-bottom: 8px;
    }
    .lock-message-text {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 16px;
    }
    .lock-countdown {
      font-size: 24px;
      font-weight: 600;
      color: var(--warning);
      font-family: monospace;
    }

    /* 寰俊鎵爜鐧诲綍 */
    .wechat-login {
      text-align: center;
      padding: 20px 0;
    }
    .qrcode-wrap {
      width: 200px;
      height: 200px;
      margin: 0 auto 24px;
      padding: 16px;
      background: #fff;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .qrcode-placeholder {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #f0f0f0, #e0e0e0);
      border-radius: 4px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #999;
      font-size: 12px;
    }
    .qrcode-placeholder-icon {
      font-size: 48px;
      margin-bottom: 8px;
    }
    .wechat-tip {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .wechat-refresh {
      font-size: 13px;
      color: var(--primary);
      cursor: pointer;
    }
    .wechat-refresh:hover {
      text-decoration: underline;
    }

    /* 楠岃瘉鐮佽緭鍏?*/
    .captcha-wrap {
      display: flex;
      gap: 12px;
    }
    .captcha-wrap .form-input {
      flex: 1;
    }
    .captcha-img {
      width: 120px;
      height: 48px;
      border-radius: 10px;
      background: var(--bg-hover);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 20px;
      font-weight: 600;
      color: var(--primary);
      letter-spacing: 4px;
      user-select: none;
    }
    .captcha-img:hover {
      background: var(--border);
    }

    /* 娉ㄥ唽閾炬帴 */
    .login-footer {
      text-align: center;
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }
    .login-footer-text {
      font-size: 14px;
      color: var(--muted);
    }
    .login-footer-link {
      color: var(--primary);
      text-decoration: none;
      font-weight: 500;
    }
    .login-footer-link:hover {
      text-decoration: underline;
    }

    /* 鍝嶅簲寮?*/
    @media (max-width: 1024px) {
      .login-brand {
        display: none;
      }
      .login-form-wrap {
        width: 100%;
        max-width: 480px;
        margin: 0 auto;
        padding: 40px 20px;
      }
    }
  </style>
</head>
<body class="login-page">
  <!-- 鑳屾櫙瑁呴グ -->
  <div class="login-bg"></div>

  <!-- 宸︿晶鍝佺墝鍖?-->
  <div class="login-brand">
    <div class="brand-logo">
      <div class="brand-logo-icon"></div>
    </div>
    <h1 class="brand-title">浼佷笟绠＄悊绯荤粺</h1>
    <p class="brand-subtitle">鏅鸿兘鍖栦紒涓氱鐞嗗钩鍙帮紝鍔╁姏浼佷笟鏁板瓧鍖栬浆鍨嬶紝鎻愬崌缁勭粐鏁堣兘</p>
    <div class="brand-features">
      <div class="brand-feature">
        <div class="brand-feature-icon">馃敀</div>
        <div class="brand-feature-text">瀹夊叏鍙潬</div>
      </div>
      <div class="brand-feature">
        <div class="brand-feature-icon">鈿?/div>
        <div class="brand-feature-text">楂樻晥渚挎嵎</div>
      </div>
      <div class="brand-feature">
        <div class="brand-feature-icon">馃搳</div>
        <div class="brand-feature-text">鏁版嵁椹卞姩</div>
      </div>
    </div>
  </div>

  <!-- 鍙充晶鐧诲綍鍖?-->
  <div class="login-form-wrap">
    <div class="login-card">
      <div class="login-header">
        <h2 class="login-title">娆㈣繋鐧诲綍</h2>
        <p class="login-subtitle">璇蜂娇鐢ㄦ偍鐨勮处鍙峰瘑鐮佹垨寰俊鎵爜鐧诲綍</p>
      </div>

      <!-- 鐧诲綍鏂瑰紡鍒囨崲 -->
      <div class="login-tabs">
        <button class="login-tab active" onclick="switchTab('password')">馃攼 瀵嗙爜鐧诲綍</button>
        <button class="login-tab" onclick="switchTab('wechat')">馃挰 寰俊鐧诲綍</button>
      </div>

      <!-- 閿欒鎻愮ず -->
      <div class="error-message" id="errorMessage">
        <span>鈿狅笍</span>
        <span id="errorText">鐢ㄦ埛鍚嶆垨瀵嗙爜閿欒</span>
      </div>

      <!-- 閿佸畾鎻愮ず -->
      <div class="lock-message" id="lockMessage">
        <div class="lock-message-icon">馃敀</div>
        <div class="lock-message-title">鐧诲綍宸查攣瀹?/div>
        <div class="lock-message-text">澶辫触娆℃暟杩囧锛岃绋嶅悗鍐嶈瘯</div>
        <div class="lock-countdown" id="lockCountdown">05:00</div>
      </div>

      <!-- 瀵嗙爜鐧诲綍 -->
      <div class="login-content active" id="passwordLogin">
        <form class="login-form" id="loginForm">
          <div class="form-group">
            <label class="form-label">鐢ㄦ埛鍚?/label>
            <input type="text" class="form-input" id="username" placeholder="璇疯緭鍏ョ敤鎴峰悕/閭/鎵嬫満鍙? required />
          </div>
          <div class="form-group">
            <label class="form-label">瀵嗙爜</label>
            <div class="password-wrap">
              <input type="password" class="form-input" id="password" placeholder="璇疯緭鍏ュ瘑鐮? required />
              <button type="button" class="password-toggle" onclick="togglePassword()">馃憗锔?/button>
            </div>
          </div>
          <div class="form-group" id="captchaGroup" style="display: none;">
            <label class="form-label">楠岃瘉鐮?/label>
            <div class="captcha-wrap">
              <input type="text" class="form-input" id="captcha" placeholder="璇疯緭鍏ラ獙璇佺爜" maxlength="4" />
              <div class="captcha-img" id="captchaImg" onclick="refreshCaptcha()">AB12</div>
            </div>
          </div>
          <div class="login-options">
            <label class="remember-me">
              <input type="checkbox" id="rememberMe" />
              <span>璁颁綇鎴?/span>
            </label>
            <a href="#" class="forgot-password" onclick="showToast('璇疯仈绯荤鐞嗗憳閲嶇疆瀵嗙爜')">蹇樿瀵嗙爜锛?/a>
          </div>
          <button type="submit" class="login-btn" id="loginBtn">
            <span>鐧?褰?/span>
          </button>
        </form>
      </div>

      <!-- 寰俊鐧诲綍 -->
      <div class="login-content" id="wechatLogin">
        <div class="wechat-login">
          <div class="qrcode-wrap">
            <div class="qrcode-placeholder">
              <div class="qrcode-placeholder-icon">馃摫</div>
              <div>寰俊浜岀淮鐮?/div>
            </div>
          </div>
          <p class="wechat-tip">璇蜂娇鐢ㄥ井淇℃壂涓€鎵櫥褰?/p>
          <p class="wechat-refresh" onclick="refreshQRCode()">鍒锋柊浜岀淮鐮?/p>
        </div>
      </div>

      <!-- 娉ㄥ唽閾炬帴 -->
      <div class="login-footer">
        <p class="login-footer-text">
          杩樻病鏈夎处鍙凤紵<a href="#" class="login-footer-link" onclick="showToast('璇疯仈绯荤鐞嗗憳寮€閫氳处鍙?)">鑱旂郴绠＄悊鍛?/a>
        </p>
      </div>
    </div>
  </div>

  <script src="common.v2.js"></script>


</body>
</html>
