<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>用户管理 - 企业管理系统</title>
  <link rel="stylesheet" href="common.css" />
</head>
<body>
  <!-- 顶部栏 -->
  <header class="header">
    <div class="header-left">
      <div class="logo-wrap">
        <div class="logo-bg"><div class="logo-icon"></div></div>
      </div>
      <div>
        <div class="system-name">企业管理系统</div>
      </div>
      <input class="search-box" placeholder="搜索功能、数据、用户..." />
    </div>
    <div class="header-right">
      <button class="icon-btn" title="切换主题" onclick="toggleTheme()">
        <span id="themeToggleIcon">☀️</span>
      </button>
      <button class="icon-btn" title="通知">🔔<span class="badge">3</span></button>
      <button class="icon-btn" title="帮助">❓</button>
      <div class="user-menu" onclick="showLogoutMenu()">
        <div class="avatar" id="userAvatar">肖</div>
        <span class="user-name" id="currentUsername">肖先生</span>
        <span style="color:var(--muted)">▼</span>
      </div>
    </div>
  </header>

  <!-- 侧边栏 -->
  <aside class="sidebar">
    <div class="nav-section">
      <div class="nav-title">工作台</div>
      <a class="nav-item" href="dashboard.html"><span class="nav-icon">🏠</span><span>首页概览</span></a>
      <a class="nav-item"><span class="nav-icon">📊</span><span>数据报表</span></a>
      <a class="nav-item"><span class="nav-icon">📋</span><span>待办事项</span></a>
    </div>
    <div class="nav-section">
      <div class="nav-title">组织管理</div>
      <a class="nav-item" href="user-management.html"><span class="nav-icon">👥</span><span>用户管理</span></a>
      <a class="nav-item" href="department.html"><span class="nav-icon">🏢</span><span>部门架构</span></a>
      <a class="nav-item" href="role-permission.html"><span class="nav-icon">🔐</span><span>角色权限</span></a>
    </div>
    <div class="nav-section">
      <div class="nav-title">系统管理</div>
      <a class="nav-item"><span class="nav-icon">⚙️</span><span>系统设置</span></a>
      <a class="nav-item"><span class="nav-icon">📜</span><span>操作日志</span></a>
      <a class="nav-item"><span class="nav-icon">🔒</span><span>安全审计</span></a>
    </div>
  </aside>

  <!-- 主内容区 -->
  <main class="main">
    <!-- 页面头部 -->
    <div class="page-header">
      <div>
        <div class="breadcrumb">组织管理 / <span>用户管理</span></div>
        <div class="page-title">用户管理</div>
      </div>
      <button class="btn btn-primary" onclick="openModal('add')">+ 新增用户</button>
    </div>

    <!-- 筛选区 -->
    <div class="filter-bar">
      <div class="filter-row">
        <div class="filter-item" style="flex:1;min-width:200px">
          <label class="filter-label">关键词搜索</label>
          <input class="filter-input" id="searchKeyword" placeholder="姓名/账号/手机号/邮箱" />
        </div>
        <div class="filter-item">
          <label class="filter-label">部门</label>
          <select class="filter-select" id="filterDept">
            <option value="">全部部门</option>
            <option value="tech">技术部</option>
            <option value="product">产品部</option>
            <option value="design">设计部</option>
            <option value="hr">人力资源部</option>
            <option value="finance">财务部</option>
            <option value="sales">销售部</option>
          </select>
        </div>
        <div class="filter-item">
          <label class="filter-label">角色</label>
          <select class="filter-select" id="filterRole">
            <option value="">全部角色</option>
            <option value="admin">管理员</option>
            <option value="manager">部门经理</option>
            <option value="user">普通用户</option>
            <option value="guest">访客</option>
          </select>
        </div>
        <div class="filter-item">
          <label class="filter-label">状态</label>
          <select class="filter-select" id="filterStatus">
            <option value="">全部状态</option>
            <option value="active">正常</option>
            <option value="disabled">禁用</option>
            <option value="pending">待激活</option>
          </select>
        </div>
        <div class="filter-item" style="margin-top:auto">
          <button class="btn btn-primary" style="height:36px" onclick="handleSearch()">🔍 搜索</button>
        </div>
        <div class="filter-item" style="margin-top:auto">
          <button class="btn btn-outline" style="height:36px" onclick="handleReset()">重置</button>
        </div>
      </div>
    </div>

    <!-- 批量操作栏 -->
    <div class="batch-bar" id="batchBar" style="display:none">
      <span class="batch-info">已选择 <strong id="selectedCount">0</strong> 个用户</span>
      <div class="batch-actions">
        <button class="btn btn-sm btn-outline" onclick="batchAction('enable')">批量启用</button>
        <button class="btn btn-sm btn-outline" onclick="batchAction('disable')">批量禁用</button>
        <button class="btn btn-sm btn-danger" onclick="batchAction('delete')">批量删除</button>
        <button class="btn btn-sm btn-outline" onclick="showToast('导出成功')">导出选中</button>
      </div>
    </div>

    <!-- 表格 -->
    <div class="table-card">
      <div class="table-wrap">
        <table id="userTable">
          <thead>
            <tr>
              <th style="width:50px"><input type="checkbox" class="checkbox" id="selectAll" /></th>
              <th>用户信息</th>
              <th>部门</th>
              <th>角色</th>
              <th>手机号</th>
              <th>状态</th>
              <th>最后登录</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="userTableBody">
            <!-- 数据由 JS 渲染 -->
          </tbody>
        </table>
      </div>

      <!-- 分页 -->
      <div class="pagination">
        <div class="page-info">共 <strong id="totalCount">2,847</strong> 条记录</div>
        <div class="page-controls">
          <span style="font-size:13px;color:var(--muted)">每页</span>
          <select class="page-size" id="pageSize" onchange="changePageSize()">
            <option>10</option>
            <option selected>20</option>
            <option>50</option>
            <option>100</option>
          </select>
          <button class="page-btn" onclick="goToPage(1)" id="btnFirst">◀</button>
          <button class="page-btn" onclick="prevPage()" id="btnPrev">&lt;</button>
          <span id="pageNumbers"></span>
          <button class="page-btn" onclick="nextPage()" id="btnNext">&gt;</button>
          <button class="page-btn" onclick="goToPage(totalPages)" id="btnLast">▶</button>
        </div>
      </div>
    </div>
  </main>

  <!-- 新增/编辑用户弹窗 -->
  <div class="modal-overlay" id="userModal">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title" id="modalTitle">新增用户</div>
        <button class="modal-close" onclick="closeModal('userModal')">×</button>
      </div>
      <div class="modal-body">
        <form id="userForm">
          <input type="hidden" id="userId" />
          <div class="form-row">
            <div class="form-group">
              <label class="form-label required">姓名</label>
              <input class="form-input" id="userName" placeholder="请输入姓名" required />
            </div>
            <div class="form-group">
              <label class="form-label required">账号</label>
              <input class="form-input" id="userAccount" placeholder="请输入账号（英文/数字）" required />
            </div>
          </div>
          <div class="form-row" id="passwordRow">
            <div class="form-group">
              <label class="form-label required">密码</label>
              <input class="form-input" type="password" id="userPassword" placeholder="请输入密码" />
              <div class="form-hint">至少 8 位，含大小写字母和数字</div>
            </div>
            <div class="form-group">
              <label class="form-label required">确认密码</label>
              <input class="form-input" type="password" id="userPasswordConfirm" placeholder="请再次输入密码" />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">手机号</label>
              <input class="form-input" id="userPhone" placeholder="请输入手机号" />
            </div>
            <div class="form-group">
              <label class="form-label">邮箱</label>
              <input class="form-input" type="email" id="userEmail" placeholder="请输入邮箱" />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label required">部门</label>
              <select class="form-select" id="userDept" required>
                <option value="">请选择部门</option>
                <option value="tech">技术部</option>
                <option value="product">产品部</option>
                <option value="design">设计部</option>
                <option value="hr">人力资源部</option>
                <option value="finance">财务部</option>
                <option value="sales">销售部</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label required">角色</label>
              <select class="form-select" id="userRole" required>
                <option value="">请选择角色</option>
                <option value="admin">管理员</option>
                <option value="manager">部门经理</option>
                <option value="user">普通用户</option>
                <option value="guest">访客</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">状态</label>
            <select class="form-select" id="userStatus">
              <option value="active">正常</option>
              <option value="disabled">禁用</option>
              <option value="pending">待激活</option>
            </select>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeModal('userModal')">取消</button>
        <button class="btn btn-primary" onclick="saveUser()">确定</button>
      </div>
    </div>
  </div>

  <!-- 重置密码弹窗 -->
  <div class="modal-overlay" id="resetModal">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">重置密码</div>
        <button class="modal-close" onclick="closeModal('resetModal')">×</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">用户</label>
          <div style="font-size:14px;color:#fff;padding:10px 0" id="resetUserName">张三 (zhangsan)</div>
        </div>
        <div class="form-group">
          <label class="form-label required">新密码</label>
          <input class="form-input" type="password" id="newPassword" placeholder="请输入新密码" />
          <div class="form-hint">至少 8 位，含大小写字母和数字</div>
        </div>
        <div class="form-group">
          <label class="form-label required">确认新密码</label>
          <input class="form-input" type="password" id="newPasswordConfirm" placeholder="请再次输入新密码" />
        </div>
        <div class="form-group">
          <label style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);cursor:pointer">
            <input type="checkbox" id="sendEmail" /> 同时发送邮件通知用户
          </label>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeModal('resetModal')">取消</button>
        <button class="btn btn-primary" onclick="resetPassword()">确定重置</button>
      </div>
    </div>
  </div>

  <script src="common.js"></script>
  <script>
    // 显示退出菜单
    function showLogoutMenu() {
      const menu = document.createElement('div');
      menu.className = 'logout-menu';
      menu.style.cssText = `
        position:fixed;top:60px;right:20px;width:160px;
        background:var(--bg-elev);border:1px solid var(--border);
        border-radius:10px;box-shadow:var(--shadow);z-index:1000;
        overflow:hidden;
      `;
      menu.innerHTML = `
        <div style="padding:12px 16px;border-bottom:1px solid var(--border);font-size:13px;color:var(--muted);">
          当前用户
        </div>
        <div style="padding:12px 16px;font-size:14px;color:var(--text);font-weight:500;" id="menuUsername">
          ${document.getElementById('currentUsername').textContent}
        </div>
        <div style="padding:8px;border-top:1px solid var(--border);">
          <button onclick="logout();document.querySelector('.logout-menu').remove();" 
            style="width:100%;padding:10px;border:none;border-radius:6px;background:transparent;color:var(--danger);font-size:13px;cursor:pointer;text-align:left;">
            🚪 退出登录
          </button>
        </div>
      `;
      document.body.appendChild(menu);
      
      setTimeout(() => {
        document.addEventListener('click', function closeMenu(e) {
          if (!menu.contains(e.target)) {
            menu.remove();
            document.removeEventListener('click', closeMenu);
          }
        });
      }, 100);
    }
  </script>
  <script>
    // 分页状态
    let currentPage = 1;
    let pageSize = 20;
    let totalCount = 0;
    let editingUserId = null;
    let resettingUserId = null;

    // 部门/角色映射（从 API 加载）
    let deptMap = {};
    let roleMap = {};

    // 状态映射
    const statusMap = {
      active: { text: '正常', class: 'status-active' },
      disabled: { text: '禁用', class: 'status-disabled' },
      pending: { text: '待激活', class: 'status-pending' }
    };

    // 头像颜色
    const avatarColors = [
      'linear-gradient(135deg,#60A5FA,#3B82F6)',
      'linear-gradient(135deg,#FBBF24,#F59E0B)',
      'linear-gradient(135deg,#4ADE80,#22C55E)',
      'linear-gradient(135deg,#F87171,#EF4444)',
      'linear-gradient(135deg,#A78BFA,#8B5CF6)',
      'linear-gradient(135deg,#FB7185,#F43F5E)',
      'linear-gradient(135deg,#34D399,#10B981)'
    ];

    function getAvatarColor(name) {
      let hash = 0;
      for (let i = 0; i < name.length; i++) {
        hash = name.charCodeAt(i) + ((hash << 5) - hash);
      }
      return avatarColors[Math.abs(hash) % avatarColors.length];
    }

    // 加载部门列表
    async function loadDepartments() {
      try {
        const res = await AuthManager.api('/departments');
        const data = await res.json();
        const depts = data.data || [];
        
        deptMap = {};
        depts.forEach(d => { deptMap[d.id] = d.name; });

        // 更新筛选下拉框
        const filterSelect = document.getElementById('filterDept');
        filterSelect.innerHTML = '<option value="">全部部门</option>' +
          depts.map(d => `<option value="${d.id}">${d.name}</option>`).join('');

        // 更新表单下拉框
        const formSelect = document.getElementById('userDept');
        formSelect.innerHTML = '<option value="">请选择部门</option>' +
          depts.map(d => `<option value="${d.id}">${d.name}</option>`).join('');
      } catch (e) {
        console.error('加载部门失败:', e);
      }
    }

    // 加载角色列表
    async function loadRoles() {
      try {
        const res = await AuthManager.api('/roles');
        const data = await res.json();
        const roles = data.data || [];
        
        roleMap = {};
        roles.forEach(r => { roleMap[r.id] = r.name; });

        // 更新筛选下拉框
        const filterSelect = document.getElementById('filterRole');
        filterSelect.innerHTML = '<option value="">全部角色</option>' +
          roles.map(r => `<option value="${r.id}">${r.name}</option>`).join('');

        // 更新表单下拉框
        const formSelect = document.getElementById('userRole');
        formSelect.innerHTML = '<option value="">请选择角色</option>' +
          roles.map(r => `<option value="${r.id}">${r.name}</option>`).join('');
      } catch (e) {
        console.error('加载角色失败:', e);
      }
    }

    // 加载用户列表
    async function loadUsers() {
      try {
        const keyword = document.getElementById('searchKeyword').value.trim();
        const dept_id = document.getElementById('filterDept').value;
        const role_id = document.getElementById('filterRole').value;
        const status = document.getElementById('filterStatus').value;

        const params = new URLSearchParams();
        params.append('page', currentPage);
        params.append('pageSize', pageSize);
        if (keyword) params.append('keyword', keyword);
        if (dept_id) params.append('dept_id', dept_id);
        if (role_id) params.append('role_id', role_id);
        if (status) params.append('status', status);

        const res = await AuthManager.api(`/users?${params}`);
        const data = await res.json();

        totalCount = data.total || 0;
        renderTable(data.list || []);
      } catch (e) {
        console.error('加载用户失败:', e);
        showToast('加载用户列表失败', 'error');
      }
    }

    // 渲染表格
    function renderTable(users) {
      const tbody = document.getElementById('userTableBody');
      
      if (!users || users.length === 0) {
        tbody.innerHTML = `
          <tr>
            <td colspan="8" style="text-align:center;padding:40px;color:var(--muted);">
              暂无数据
            </td>
          </tr>
        `;
        updatePagination();
        return;
      }

      tbody.innerHTML = users.map(user => {
        const status = statusMap[user.status] || statusMap.active;
        return `
          <tr data-id="${user.id}">
            <td><input type="checkbox" class="checkbox user-checkbox" value="${user.id}" /></td>
            <td>
              <div class="user-cell">
                <div class="user-avatar" style="background:${getAvatarColor(user.name)}">${user.name[0]}</div>
                <div class="user-info">
                  <span class="user-name-cell">${user.name}</span>
                  <span class="user-account">${user.username}</span>
                </div>
              </div>
            </td>
            <td>${user.dept_name || '-'}</td>
            <td>${user.role_name || '-'}</td>
            <td>${user.phone || '-'}</td>
            <td><span class="status-badge ${status.class}">${status.text}</span></td>
            <td>${user.last_login || '从未登录'}</td>
            <td>
              <div class="action-btns">
                <a class="action-link" onclick="editUser(${user.id})">编辑</a>
                <a class="action-link" onclick="openResetModal(${user.id}, '${user.name}', '${user.username}')">重置密码</a>
                <a class="action-link danger" onclick="deleteUser(${user.id})">删除</a>
              </div>
            </td>
          </tr>
        `;
      }).join('');

      // 重新绑定复选框事件
      document.querySelectorAll('.user-checkbox').forEach(cb => {
        cb.addEventListener('change', () => TableBatch.updateBatchBar());
      });

      updatePagination();
    }

    // 更新分页
    function updatePagination() {
      const totalPages = Math.ceil(totalCount / pageSize) || 1;
      document.getElementById('totalCount').textContent = totalCount.toLocaleString();
      
      // 更新按钮状态
      document.getElementById('btnFirst').disabled = currentPage === 1;
      document.getElementById('btnPrev').disabled = currentPage === 1;
      document.getElementById('btnNext').disabled = currentPage === totalPages;
      document.getElementById('btnLast').disabled = currentPage === totalPages;

      // 生成页码
      let html = '';
      const maxVisible = 5;
      let startPage = Math.max(1, currentPage - Math.floor(maxVisible / 2));
      let endPage = Math.min(totalPages, startPage + maxVisible - 1);
      
      if (endPage - startPage < maxVisible - 1) {
        startPage = Math.max(1, endPage - maxVisible + 1);
      }

      if (startPage > 1) {
        html += `<button class="page-btn ${1 === currentPage ? 'active' : ''}" onclick="goToPage(1)">1</button>`;
        if (startPage > 2) html += `<span style="color:var(--muted);padding:0 4px">...</span>`;
      }

      for (let i = startPage; i <= endPage; i++) {
        html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
      }

      if (endPage < totalPages) {
        if (endPage < totalPages - 1) html += `<span style="color:var(--muted);padding:0 4px">...</span>`;
        html += `<button class="page-btn ${totalPages === currentPage ? 'active' : ''}" onclick="goToPage(${totalPages})">${totalPages}</button>`;
      }

      document.getElementById('pageNumbers').innerHTML = html;
    }

    function goToPage(page) {
      currentPage = page;
      loadUsers();
    }

    function prevPage() {
      if (currentPage > 1) {
        currentPage--;
        loadUsers();
      }
    }

    function nextPage() {
      const totalPages = Math.ceil(totalCount / pageSize);
      if (currentPage < totalPages) {
        currentPage++;
        loadUsers();
      }
    }

    function changePageSize() {
      pageSize = parseInt(document.getElementById('pageSize').value);
      currentPage = 1;
      loadUsers();
    }

    // 搜索
    function handleSearch() {
      currentPage = 1;
      loadUsers();
    }

    function handleReset() {
      document.getElementById('searchKeyword').value = '';
      document.getElementById('filterDept').value = '';
      document.getElementById('filterRole').value = '';
      document.getElementById('filterStatus').value = '';
      currentPage = 1;
      loadUsers();
      showToast('筛选已重置');
    }

    // 编辑用户
    async function editUser(id) {
      try {
        const res = await AuthManager.api(`/users/${id}`);
        const user = await res.json();

        editingUserId = id;
        document.getElementById('modalTitle').textContent = '编辑用户';
        document.getElementById('userId').value = user.id;
        document.getElementById('userName').value = user.name;
        document.getElementById('userAccount').value = user.username;
        document.getElementById('userPhone').value = user.phone || '';
        document.getElementById('userEmail').value = user.email || '';
        document.getElementById('userDept').value = user.dept_id || '';
        document.getElementById('userRole').value = user.role_id || '';
        document.getElementById('userStatus').value = user.status || 'active';
        document.getElementById('passwordRow').style.display = 'none';

        ModalManager.open('userModal');
      } catch (e) {
        showToast('获取用户信息失败', 'error');
      }
    }

    // 覆盖全局 openModal
    window.openModal = function(type) {
      if (type === 'add') {
        editingUserId = null;
        document.getElementById('modalTitle').textContent = '新增用户';
        document.getElementById('userForm').reset();
        document.getElementById('userId').value = '';
        document.getElementById('passwordRow').style.display = 'flex';
        ModalManager.open('userModal');
      }
    };

    // 保存用户
    async function saveUser() {
      const name = document.getElementById('userName').value.trim();
      const username = document.getElementById('userAccount').value.trim();
      const dept_id = document.getElementById('userDept').value;
      const role_id = document.getElementById('userRole').value;
      const status = document.getElementById('userStatus').value;
      const phone = document.getElementById('userPhone').value.trim();
      const email = document.getElementById('userEmail').value.trim();

      if (!name || !username || !dept_id || !role_id) {
        showToast('请填写必填项', 'error');
        return;
      }

      try {
        if (editingUserId) {
          // 编辑
          const res = await AuthManager.api(`/users/${editingUserId}`, {
            method: 'PUT',
            body: JSON.stringify({ name, email, phone, dept_id, role_id, status })
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.message);
          showToast('用户更新成功');
        } else {
          // 新增
          const password = document.getElementById('userPassword').value;
          const passwordConfirm = document.getElementById('userPasswordConfirm').value;
          
          if (!password || password.length < 8) {
            showToast('密码至少 8 位', 'error');
            return;
          }
          if (password !== passwordConfirm) {
            showToast('两次输入的密码不一致', 'error');
            return;
          }

          const res = await AuthManager.api('/users', {
            method: 'POST',
            body: JSON.stringify({ username, password, name, email, phone, dept_id, role_id, status })
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.message);
          showToast('用户创建成功');
        }

        closeModal('userModal');
        loadUsers();
      } catch (e) {
        showToast(e.message || '操作失败', 'error');
      }
    }

    // 删除用户
    async function deleteUser(id) {
      if (!confirm('确定要删除该用户吗？此操作不可恢复。')) return;

      try {
        const res = await AuthManager.api(`/users/${id}`, { method: 'DELETE' });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message);
        showToast('删除成功');
        loadUsers();
      } catch (e) {
        showToast(e.message || '删除失败', 'error');
      }
    }

    // 重置密码
    function openResetModal(id, name, username) {
      resettingUserId = id;
      document.getElementById('resetUserName').textContent = `${name} (${username})`;
      document.getElementById('newPassword').value = '';
      document.getElementById('newPasswordConfirm').value = '';
      document.getElementById('sendEmail').checked = false;
      ModalManager.open('resetModal');
    }

    async function resetPassword() {
      const password = document.getElementById('newPassword').value;
      const passwordConfirm = document.getElementById('newPasswordConfirm').value;

      if (!password || password.length < 8) {
        showToast('密码至少 8 位', 'error');
        return;
      }
      if (password !== passwordConfirm) {
        showToast('两次输入的密码不一致', 'error');
        return;
      }

      try {
        const res = await AuthManager.api(`/users/${resettingUserId}/reset-password`, {
          method: 'PUT',
          body: JSON.stringify({ password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message);

        closeModal('resetModal');
        const sendEmail = document.getElementById('sendEmail').checked;
        showToast(sendEmail ? '密码已重置，邮件通知已发送' : '密码重置成功');
      } catch (e) {
        showToast(e.message || '重置失败', 'error');
      }
    }

    // 批量操作
    async function batchAction(action) {
      const checkboxes = document.querySelectorAll('.user-checkbox:checked');
      if (checkboxes.length === 0) {
        showToast('请先选择用户', 'warning');
        return;
      }

      const actionText = action === 'enable' ? '启用' : action === 'disable' ? '禁用' : '删除';
      if (!confirm(`确定要批量${actionText}选中的 ${checkboxes.length} 个用户吗？`)) return;

      const ids = Array.from(checkboxes).map(cb => parseInt(cb.value));

      try {
        const res = await AuthManager.api('/users/batch', {
          method: 'POST',
          body: JSON.stringify({ action, ids })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message);

        showToast(`批量${actionText}成功`);
        loadUsers();
        document.getElementById('batchBar').style.display = 'none';
        document.getElementById('selectAll').checked = false;
      } catch (e) {
        showToast(e.message || '操作失败', 'error');
      }
    }

    // 初始化
    document.addEventListener('DOMContentLoaded', async () => {
      await Promise.all([loadDepartments(), loadRoles()]);
      await loadUsers();
    });
  </script>
</body>
</html>
