    /* 页面头部整合样式 */
.page-header { display:flex; justify-content:space-between; align-items:center; padding-bottom:16px; border-bottom:1px solid var(--border); margin-bottom:16px; }
.page-header .header-left { display:flex; flex-direction:column; gap:8px; }
.header-right-area { display:flex; align-items:center; gap:20px; }
.view-tabs { display:flex; gap:0; border-bottom:2px solid var(--border); }
    .view-tab { padding:8px 16px; background:none; border:none; border-bottom:2px solid transparent; margin-bottom:-2px; color:var(--muted); cursor:pointer; transition:all .2s; }
    .view-tab.active { color:var(--text); border-bottom-color:var(--primary); font-size:18px; font-weight:600; }
    .view-tab.muted { font-size:13px; opacity:0.5; border-bottom-color:transparent; }
    .view-tab.muted:hover { opacity:1; color:var(--text); }
    .view-tab .tab-badge { display:inline-block; background:var(--danger,#EF4444); color:#fff; font-size:11px; padding:1px 6px; border-radius:10px; margin-left:6px; vertical-align:middle; }
  </style>
</head>

  <!-- 侧边栏 -->

    <div class="nav-section">

    <div class="nav-section">

  <script src="common.js"></script>
  <script>
    // 显示退出菜单
    function showLogoutMenu() {
      const menu = document.createElement('div');
      menu.className = 'logout-menu';
      menu.style.cssText = `
        position:fixed;top:60px;right:20px;width:160px;
        background:var(--bg-elev);border:1px solid var(--border);
        border-radius:10px;box-shadow:var(--shadow);z-index:1000;
        overflow:hidden;
      `;
      menu.innerHTML = `
        <div style="padding:12px 16px;border-bottom:1px solid var(--border);font-size:13px;color:var(--muted);">
          当前用户
        </div>
        <div style="padding:12px 16px;font-size:14px;color:var(--text);font-weight:500;" id="menuUsername">
          ${document.getElementById('currentUsername').textContent}
        </div>
        <div style="padding:8px;border-top:1px solid var(--border);">
          <button onclick="logout();document.querySelector('.logout-menu').remove();" 
            style="width:100%;padding:10px;border:none;border-radius:6px;background:transparent;color:var(--danger);font-size:13px;cursor:pointer;text-align:left;">
            🚪 退出登录
          </button>
        </div>
      `;
      document.body.appendChild(menu);
      
      setTimeout(() => {
        document.addEventListener('click', function closeMenu(e) {
          if (!menu.contains(e.target)) {
            menu.remove();
            document.removeEventListener('click', closeMenu);
          }
        });
      }, 100);
    }
  </script>
  <script>
    // 分页状态
    let currentPage = 1;
    let pageSize = 20;
    let totalCount = 0;
    let editingUserId = null;
    let resettingUserId = null;
    let currentView = 'active'; // 'active' | 'deleted'

    // 部门/角色映射（从 API 加载）
    let deptMap = {};
    let roleMap = {};

    // 状态映射
    const statusMap = {
      active: { text: '正常', class: 'status-active' },
      disabled: { text: '禁用', class: 'status-disabled' },
      pending: { text: '待激活', class: 'status-pending' }
    };

    // 头像颜色
    const avatarColors = [
      'linear-gradient(135deg,#60A5FA,#3B82F6)',
      'linear-gradient(135deg,#FBBF24,#F59E0B)',
      'linear-gradient(135deg,#4ADE80,#22C55E)',
      'linear-gradient(135deg,#F87171,#EF4444)',
      'linear-gradient(135deg,#A78BFA,#8B5CF6)',
      'linear-gradient(135deg,#FB7185,#F43F5E)',
      'linear-gradient(135deg,#34D399,#10B981)'
    ];

    function getAvatarColor(name) {
      let hash = 0;
      for (let i = 0; i < name.length; i++) {
        hash = name.charCodeAt(i) + ((hash << 5) - hash);
      }
      return avatarColors[Math.abs(hash) % avatarColors.length];
    }

    // 加载部门列表
    async function loadDepartments() {
      try {
        const res = await AuthManager.api('/departments');
        const data = await res.json();
        const depts = data.data || [];
        
        deptMap = {};
        depts.forEach(d => { deptMap[d.id] = d.name; });

        // 构建部门树并渲染树形下拉
        deptTreeData = buildDeptTree(depts);
        renderDeptTree(deptTreeData);
      } catch (e) {
        console.error('加载部门失败:', e);
      }
    }

    // 构建部门树
    function buildDeptTree(depts) {
      const map = {};
      const roots = [];
      
      depts.forEach(d => {
        map[d.id] = { ...d, children: [], expanded: false };
      });
      
      depts.forEach(d => {
        if (d.parent_id && map[d.parent_id]) {
          map[d.parent_id].children.push(map[d.id]);
        } else {
          roots.push(map[d.id]);
        }
      });
      
      return roots;
    }

    // 部门树数据缓存
    let deptTreeData = [];

    // 渲染部门树
    function renderDeptTree(tree, container = null, level = 0) {
      const target = container || document.getElementById('deptTreeOptions');
      if (!container) target.innerHTML = '';
      
      tree.forEach(node => {
        const hasChildren = node.children && node.children.length > 0;
        const indentWidth = level * 16;
        
        const nodeEl = document.createElement('div');
        nodeEl.className = 'tree-node';
        nodeEl.dataset.id = node.id;
        nodeEl.dataset.name = node.name;
        nodeEl.dataset.haschildren = hasChildren;
        nodeEl.dataset.level = level;
        nodeEl.innerHTML = `
          <span class="indent" style="width:${indentWidth}px"></span>
          <span class="expand-icon ${hasChildren ? '' : 'leaf'}" onclick="toggleTreeNode(event, ${node.id})">
            ${hasChildren ? '▶' : ''}
          </span>
          <span onclick="selectDept(${node.id}, '${node.name}')">${node.name}</span>
        `;
        target.appendChild(nodeEl);
        
        // 创建子节点容器（初始隐藏）
        if (hasChildren) {
          const childrenContainer = document.createElement('div');
          childrenContainer.className = 'tree-children';
          childrenContainer.id = `tree-children-${node.id}`;
          childrenContainer.style.display = 'none';
          target.appendChild(childrenContainer);
        }
      });
    }

    // 切换树节点展开/折叠
    function toggleTreeNode(event, nodeId) {
      event.stopPropagation();
      const childrenEl = document.getElementById(`tree-children-${nodeId}`);
      const icon = event.target;
      
      if (!childrenEl) return;
      
      const isHidden = childrenEl.style.display === 'none';
      
      if (isHidden) {
        // 展开：先渲染子节点（如果为空）
        if (childrenEl.children.length === 0) {
          const parentNode = findNodeInTree(deptTreeData, nodeId);
          if (parentNode && parentNode.children) {
            const level = parseInt(icon.closest('.tree-node').dataset.level) + 1;
            renderDeptTree(parentNode.children, childrenEl, level);
          }
        }
        childrenEl.style.display = 'block';
        icon.textContent = '▼';
      } else {
        // 折叠
        childrenEl.style.display = 'none';
        icon.textContent = '▶';
      }
    }

    // 在树中查找节点
    function findNodeInTree(tree, nodeId) {
      for (const node of tree) {
        if (node.id === nodeId) return node;
        if (node.children && node.children.length > 0) {
          const found = findNodeInTree(node.children, nodeId);
          if (found) return found;
        }
      }
      return null;
    }

    // 切换部门树下拉
    function toggleDeptTree() {
      const dropdown = document.getElementById('deptTreeDropdown');
      const isOpen = dropdown.style.display !== 'none';
      dropdown.style.display = isOpen ? 'none' : 'block';
      document.getElementById('deptTreeSelect').classList.toggle('open', !isOpen);
    }

    // 选择部门
    function selectDept(id, name) {
      document.getElementById('filterDept').value = id;
      document.getElementById('deptSelectedText').textContent = name;
      document.getElementById('deptTreeDropdown').style.display = 'none';
      document.getElementById('deptTreeSelect').classList.remove('open');
    }

    // 切换表单部门树下拉
    function toggleFormDeptTree() {
      const dropdown = document.getElementById('formDeptTreeDropdown');
      const isOpen = dropdown.style.display !== 'none';
      dropdown.style.display = isOpen ? 'none' : 'block';
      document.getElementById('formDeptTreeSelect').classList.toggle('open', !isOpen);
      if (!isOpen && dropdown.children[0].children.length === 0) {
        renderFormDeptTree(deptTreeData);
      }
    }

    // 选择表单部门
    function selectFormDept(id, name) {
      document.getElementById('userDept').value = id;
      document.getElementById('formDeptSelectedText').textContent = name;
      document.getElementById('formDeptTreeDropdown').style.display = 'none';
      document.getElementById('formDeptTreeSelect').classList.remove('open');
    }

    // 渲染表单部门树
    function renderFormDeptTree(tree, container = null, level = 0) {
      const target = container || document.getElementById('formDeptTreeOptions');
      if (!container) target.innerHTML = '';
      
      tree.forEach(node => {
        const hasChildren = node.children && node.children.length > 0;
        const indentWidth = level * 16;
        
        const nodeEl = document.createElement('div');
        nodeEl.className = 'tree-node';
        nodeEl.dataset.id = node.id;
        nodeEl.dataset.name = node.name;
        nodeEl.dataset.haschildren = hasChildren;
        nodeEl.dataset.level = level;
        nodeEl.innerHTML = `
          <span class="indent" style="width:${indentWidth}px"></span>
          <span class="expand-icon ${hasChildren ? '' : 'leaf'}" onclick="toggleFormTreeNode(event, ${node.id})">
            ${hasChildren ? '▶' : ''}
          </span>
          <span onclick="selectFormDept(${node.id}, '${node.name}')">${node.name}</span>
        `;
        target.appendChild(nodeEl);
        
        if (hasChildren) {
          const childrenContainer = document.createElement('div');
          childrenContainer.className = 'tree-children';
          childrenContainer.id = `form-tree-children-${node.id}`;
          childrenContainer.style.display = 'none';
          target.appendChild(childrenContainer);
        }
      });
    }

    // 切换表单树节点展开/折叠
    function toggleFormTreeNode(event, nodeId) {
      event.stopPropagation();
      const childrenEl = document.getElementById(`form-tree-children-${nodeId}`);
      const icon = event.target;
      
      if (!childrenEl) return;
      
      const isHidden = childrenEl.style.display === 'none';
      
      if (isHidden) {
        if (childrenEl.children.length === 0) {
          const parentNode = findNodeInTree(deptTreeData, nodeId);
          if (parentNode && parentNode.children) {
            const level = parseInt(icon.closest('.tree-node').dataset.level) + 1;
            renderFormDeptTree(parentNode.children, childrenEl, level);
          }
        }
        childrenEl.style.display = 'block';
        icon.textContent = '▼';
      } else {
        childrenEl.style.display = 'none';
        icon.textContent = '▶';
      }
    }

    // 点击外部关闭下拉
    document.addEventListener('click', (e) => {
      const treeSelect = document.getElementById('deptTreeSelect');
      if (treeSelect && !treeSelect.contains(e.target)) {
        document.getElementById('deptTreeDropdown').style.display = 'none';
        treeSelect.classList.remove('open');
      }
      const formTreeSelect = document.getElementById('formDeptTreeSelect');
      if (formTreeSelect && !formTreeSelect.contains(e.target)) {
        document.getElementById('formDeptTreeDropdown').style.display = 'none';
        formTreeSelect.classList.remove('open');
      }
    });

    // 加载角色列表
    async function loadRoles() {
      try {
        const res = await AuthManager.api('/roles');
        const data = await res.json();
        const roles = data.data || [];
        
        roleMap = {};
        roles.forEach(r => { roleMap[r.id] = r.name; });

        // 更新筛选下拉框
        const filterSelect = document.getElementById('filterRole');
        filterSelect.innerHTML = '<option value="">全部角色</option>' +
          roles.map(r => `<option value="${r.id}">${r.name}</option>`).join('');

        // 更新表单下拉框
        const formSelect = document.getElementById('userRole');
        formSelect.innerHTML = '<option value="">请选择角色</option>' +
          roles.map(r => `<option value="${r.id}">${r.name}</option>`).join('');
      } catch (e) {
        console.error('加载角色失败:', e);
      }
    }

    // 加载用户列表
    async function loadUsers() {
      try {
        const keyword = document.getElementById('searchKeyword').value.trim();
        const dept_id = document.getElementById('filterDept').value;
        const role_id = document.getElementById('filterRole').value;
        const status = document.getElementById('filterStatus').value;

        const params = new URLSearchParams();
        params.append('page', currentPage);
        params.append('pageSize', pageSize);
        if (keyword) params.append('keyword', keyword);
        if (dept_id) params.append('dept_id', dept_id);
        if (role_id) params.append('role_id', role_id);
        if (status) params.append('status', status);
        params.append('deleted', currentView === 'deleted' ? '1' : '0');

        const res = await AuthManager.api(`/users?${params}`);
        const data = await res.json();

        totalCount = data.total || 0;
        renderTable(data.list || []);
      } catch (e) {
        console.error('加载用户失败:', e);
        showToast('加载用户列表失败', 'error');
      }
    }

    // 渲染表格
    function renderTable(users) {
      const tbody = document.getElementById('userTableBody');
      
      if (!users || users.length === 0) {
        tbody.innerHTML = `
          <tr>
            <td colspan="8" style="text-align:center;padding:40px;color:var(--muted);">
              暂无数据
            </td>
          </tr>
        `;
        updatePagination();
        return;
      }

      tbody.innerHTML = users.map(user => {
        const status = statusMap[user.status] || statusMap.active;

        // 回收站视图：操作列只有"恢复"
        if (currentView === 'deleted') {
          return `
          <tr data-id="${user.id}">
            <td><input type="checkbox" class="checkbox user-checkbox" value="${user.id}" /></td>
            <td>
              <div class="user-cell">
                <div class="user-avatar" style="background:${getAvatarColor(user.name)}">${user.name[0]}</div>
                <div class="user-info">
                  <span class="user-name-cell">${user.name}</span>
                  <span class="user-account">${user.username}</span>
                </div>
              </div>
            </td>
            <td>${user.dept_name || '-'}</td>
            <td>${user.role_name || '-'}</td>
            <td>${user.phone || '-'}</td>
            <td><span class="status-badge status-disabled">已删除</span></td>
            <td>${user.deleted_at || '-'}</td>
            <td>
              <div class="action-btns">
                <a class="action-link" style="color:var(--success,#22C55E)" onclick="restoreUser(${user.id})">恢复</a>
              </div>
            </td>
          </tr>`;
        }

        return `
          <tr data-id="${user.id}">
            <td><input type="checkbox" class="checkbox user-checkbox" value="${user.id}" /></td>
            <td>
              <div class="user-cell">
                <div class="user-avatar" style="background:${getAvatarColor(user.name)}">${user.name[0]}</div>
                <div class="user-info">
                  <span class="user-name-cell">${user.name}</span>
                  <span class="user-account">${user.username}</span>
                </div>
              </div>
            </td>
            <td>${user.dept_name || '-'}</td>
            <td>${user.role_name || '-'}</td>
            <td>${user.phone || '-'}</td>
            <td><span class="status-badge ${status.class}">${status.text}</span></td>
            <td>${user.last_login || '从未登录'}</td>
            <td>
              <div class="action-btns">
                <a class="action-link" onclick="editUser(${user.id})">编辑</a>
                <a class="action-link" onclick="openResetModal(${user.id}, '${user.name}', '${user.username}')">重置密码</a>
                <a class="action-link danger" onclick="deleteUser(${user.id})">删除</a>
              </div>
            </td>
          </tr>
        `;
      }).join('');

      // 重新绑定复选框事件
      document.querySelectorAll('.user-checkbox').forEach(cb => {
        cb.addEventListener('change', () => TableBatch.updateBatchBar());
      });

      updatePagination();
    }

    // 更新分页
    function updatePagination() {
      const totalPages = Math.ceil(totalCount / pageSize) || 1;
      document.getElementById('totalCount').textContent = totalCount.toLocaleString();
      
      // 更新按钮状态
      document.getElementById('btnFirst').disabled = currentPage === 1;
      document.getElementById('btnPrev').disabled = currentPage === 1;
      document.getElementById('btnNext').disabled = currentPage === totalPages;
      document.getElementById('btnLast').disabled = currentPage === totalPages;

      // 生成页码
      let html = '';
      const maxVisible = 5;
      let startPage = Math.max(1, currentPage - Math.floor(maxVisible / 2));
      let endPage = Math.min(totalPages, startPage + maxVisible - 1);
      
      if (endPage - startPage < maxVisible - 1) {
        startPage = Math.max(1, endPage - maxVisible + 1);
      }

      if (startPage > 1) {
        html += `<button class="page-btn ${1 === currentPage ? 'active' : ''}" onclick="goToPage(1)">1</button>`;
        if (startPage > 2) html += `<span style="color:var(--muted);padding:0 4px">...</span>`;
      }

      for (let i = startPage; i <= endPage; i++) {
        html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
      }

      if (endPage < totalPages) {
        if (endPage < totalPages - 1) html += `<span style="color:var(--muted);padding:0 4px">...</span>`;
        html += `<button class="page-btn ${totalPages === currentPage ? 'active' : ''}" onclick="goToPage(${totalPages})">${totalPages}</button>`;
      }

      document.getElementById('pageNumbers').innerHTML = html;
    }

    function goToPage(page) {
      currentPage = page;
      loadUsers();
    }

    function prevPage() {
      if (currentPage > 1) {
        currentPage--;
        loadUsers();
      }
    }

    function nextPage() {
      const totalPages = Math.ceil(totalCount / pageSize);
      if (currentPage < totalPages) {
        currentPage++;
        loadUsers();
      }
    }

    function changePageSize() {
      pageSize = parseInt(document.getElementById('pageSize').value);
      currentPage = 1;
      loadUsers();
    }

    // 切换视图：用户列表 / 回收站
    function switchView(view) {
      if (currentView === view) return;
      currentView = view;
      currentPage = 1;

      // Tab 样式
      document.querySelectorAll('.view-tab').forEach(t => {
        const isActive = t.dataset.view === view;
        t.classList.toggle('active', isActive);
        t.classList.toggle('muted', !isActive);
      });

      // 更新面包屑标题
      const breadcrumbTitle = document.getElementById('breadcrumbTitle');
      if (view === 'deleted') {
        breadcrumbTitle.textContent = '回收站';
      } else {
        breadcrumbTitle.textContent = '用户管理';
      }

      // 隐藏/显示新增按钮
      document.getElementById('addUserBtn').style.display = view === 'deleted' ? 'none' : '';

      // 切换批量操作栏按钮
      const batchBar = document.getElementById('batchBar');
      if (view === 'deleted') {
        // 回收站视图：隐藏原有批量按钮，显示批量恢复
        batchBar.querySelector('.batch-actions').innerHTML = `
          <button class="btn btn-sm btn-primary" onclick="batchAction('restore')">批量恢复</button>
        `;
      } else {
        batchBar.querySelector('.batch-actions').innerHTML = `
          <button class="btn btn-sm btn-outline" onclick="batchAction('enable')">批量启用</button>
          <button class="btn btn-sm btn-outline" onclick="batchAction('disable')">批量禁用</button>
          <button class="btn btn-sm btn-danger" onclick="batchAction('delete')">批量删除</button>
          <button class="btn btn-sm btn-outline" onclick="showToast('导出成功')">导出选中</button>
        `;
      }

      // 隐藏批量操作栏
      batchBar.style.display = 'none';
      document.getElementById('selectAll').checked = false;

      loadUsers();
    }

    // 搜索
    function handleSearch() {
      currentPage = 1;
      loadUsers();
    }

    function handleReset() {
      document.getElementById('searchKeyword').value = '';
      document.getElementById('filterDept').value = '';
      document.getElementById('filterRole').value = '';
      document.getElementById('filterStatus').value = '';
      currentPage = 1;
      loadUsers();
      showToast('筛选已重置');
    }

    // 编辑用户
    async function editUser(id) {
      try {
        const res = await AuthManager.api(`/users/${id}`);
        const user = await res.json();

        editingUserId = id;
        document.getElementById('modalTitle').textContent = '编辑用户';
        document.getElementById('userId').value = user.id;
        document.getElementById('userName').value = user.name;
        document.getElementById('userAccount').value = user.username;
        document.getElementById('userPhone').value = user.phone || '';
        document.getElementById('userEmail').value = user.email || '';
        document.getElementById('userDept').value = user.dept_id || '';
        document.getElementById('formDeptSelectedText').textContent = deptMap[user.dept_id] || '请选择部门';
        document.getElementById('userRole').value = user.role_id || '';
        document.getElementById('userStatus').value = user.status || 'active';
        document.getElementById('passwordRow').style.display = 'none';

        ModalManager.open('userModal');
      } catch (e) {
        showToast('获取用户信息失败', 'error');
      }
    }

    // 覆盖全局 openModal
    window.openModal = function(type) {
      if (type === 'add') {
        editingUserId = null;
        document.getElementById('modalTitle').textContent = '新增用户';
        document.getElementById('userForm').reset();
        document.getElementById('userId').value = '';
        document.getElementById('passwordRow').style.display = 'flex';
        document.getElementById('formDeptSelectedText').textContent = '请选择部门';
        ModalManager.open('userModal');
      }
    };

    // 保存用户
    async function saveUser() {
      const name = document.getElementById('userName').value.trim();
      const username = document.getElementById('userAccount').value.trim();
      const dept_id = document.getElementById('userDept').value;
      const role_id = document.getElementById('userRole').value;
      const status = document.getElementById('userStatus').value;
      const phone = document.getElementById('userPhone').value.trim();
      const email = document.getElementById('userEmail').value.trim();

      if (!name || !username || !dept_id || !role_id) {
        showToast('请填写必填项', 'error');
        return;
      }

      try {
        if (editingUserId) {
          // 编辑
          const res = await AuthManager.api(`/users/${editingUserId}`, {
            method: 'PUT',
            body: JSON.stringify({ name, email, phone, dept_id, role_id, status })
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.message);
          showToast('用户更新成功');
        } else {
          // 新增
          const password = document.getElementById('userPassword').value;
          const passwordConfirm = document.getElementById('userPasswordConfirm').value;
          const pwdRegex = /^(?=.*[A-Z])(?=.*[a-z])(?=.*[0-9])(?=.*[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]).{8,}$/;
          if (!pwdRegex.test(password)) {
            showToast('密码至少8位，且必须包含大写字母、小写字母、数字和特殊字符', 'error');
            return;
          }
          if (password !== passwordConfirm) {
            showToast('两次输入的密码不一致', 'error');
            return;
          }

          const res = await AuthManager.api('/users', {
            method: 'POST',
            body: JSON.stringify({ username, password, name, email, phone, dept_id, role_id, status })
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.message);
          showToast('用户创建成功');
        }

        closeModal('userModal');
        loadUsers();
      } catch (e) {
        showToast(e.message || '操作失败', 'error');
      }
    }

    // 删除用户
    async function deleteUser(id) {
      if (!confirm('确定要删除该用户吗？')) return;

      try {
        const res = await AuthManager.api(`/users/${id}`, { method: 'DELETE' });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message);
        showToast('删除成功');
        loadUsers();
      } catch (e) {
        showToast(e.message || '删除失败', 'error');
      }
    }

    // 恢复用户
    async function restoreUser(id) {
      if (!confirm('确定要恢复该用户吗？')) return;

      try {
        const res = await AuthManager.api(`/users/${id}/restore`, { method: 'PUT' });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message);
        showToast('恢复成功');
        loadUsers();
      } catch (e) {
        showToast(e.message || '恢复失败', 'error');
      }
    }

    // 重置密码
    function openResetModal(id, name, username) {
      resettingUserId = id;
      document.getElementById('resetUserName').textContent = `${name} (${username})`;
      document.getElementById('newPassword').value = '';
      document.getElementById('newPasswordConfirm').value = '';
      document.getElementById('sendEmail').checked = false;
      ModalManager.open('resetModal');
    }

    async function resetPassword() {
      const password = document.getElementById('newPassword').value;
      const passwordConfirm = document.getElementById('newPasswordConfirm').value;
      const pwdRegex = /^(?=.*[A-Z])(?=.*[a-z])(?=.*[0-9])(?=.*[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]).{8,}$/;
      if (!pwdRegex.test(password)) {
        showToast('密码至少8位，且必须包含大写字母、小写字母、数字和特殊字符', 'error');
        return;
      }
      if (password !== passwordConfirm) {
        showToast('两次输入的密码不一致', 'error');
        return;
      }

      try {
        const res = await AuthManager.api(`/users/${resettingUserId}/reset-password`, {
          method: 'PUT',
          body: JSON.stringify({ password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message);

        closeModal('resetModal');
        const sendEmail = document.getElementById('sendEmail').checked;
        showToast(sendEmail ? '密码已重置，邮件通知已发送' : '密码重置成功');
      } catch (e) {
        showToast(e.message || '重置失败', 'error');
      }
    }

    // 批量操作
    async function batchAction(action) {
      const checkboxes = document.querySelectorAll('.user-checkbox:checked');
      if (checkboxes.length === 0) {
        showToast('请先选择用户', 'warning');
        return;
      }

      const ids = Array.from(checkboxes).map(cb => parseInt(cb.value));

      // 回收站视图：只有恢复操作
      if (currentView === 'deleted') {
        if (!confirm(`确定要批量恢复选中的 ${ids.length} 个用户吗？`)) return;
        try {
          for (const id of ids) {
            await AuthManager.api(`/users/${id}/restore`, { method: 'PUT' });
          }
          showToast(`批量恢复成功`);
          loadUsers();
          document.getElementById('batchBar').style.display = 'none';
          document.getElementById('selectAll').checked = false;
        } catch (e) {
          showToast(e.message || '恢复失败', 'error');
        }
        return;
      }

      const actionText = action === 'enable' ? '启用' : action === 'disable' ? '禁用' : '删除';
      if (!confirm(`确定要批量${actionText}选中的 ${checkboxes.length} 个用户吗？`)) return;

      try {
        const res = await AuthManager.api('/users/batch', {
          method: 'POST',
          body: JSON.stringify({ action, ids })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message);

        showToast(`批量${actionText}成功`);
        loadUsers();
        document.getElementById('batchBar').style.display = 'none';
        document.getElementById('selectAll').checked = false;
      } catch (e) {
        showToast(e.message || '操作失败', 'error');
      }
    }

    // 初始化
    document.addEventListener('DOMContentLoaded', async () => {
      await Promise.all([loadDepartments(), loadRoles()]);
      // 页面加载时自动获取用户列表
      loadUsers();
    });
  </script>
</body>
</html>
