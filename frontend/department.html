  <style>
    /* 閮ㄩ棬鏋舵瀯涓撶敤鏍峰紡 */
    .dept-layout{
      display:grid;grid-template-columns:320px 1fr;gap:20px;
    }
    .dept-tree-card{
      background:var(--bg-elev);border:1px solid var(--border);
      border-radius:var(--radius);padding:16px;
    }
    .tree-header{
      display:flex;justify-content:space-between;align-items:center;
      margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border);
    }
    .tree-title{font-size:15px;font-weight:600;color:#fff}
    .tree{list-style:none}
    .tree-node{margin:4px 0}
    .tree-item{
      display:flex;align-items:center;gap:8px;
      padding:10px 12px;border-radius:8px;
      cursor:pointer;transition:.15s;
    }
    .tree-item:hover{background:var(--bg-hover)}
    .tree-item.active{background:var(--primary-light);border-left:3px solid var(--primary)}
    .tree-toggle{
      width:20px;height:20px;border:none;border-radius:4px;
      background:transparent;color:var(--muted);
      cursor:pointer;display:flex;align-items:center;justify-content:center;
      font-size:12px;transition:.15s;
    }
    .tree-toggle:hover{color:var(--text);background:var(--bg-hover)}
    .tree-icon{font-size:16px}
    .tree-label{flex:1;font-size:13px;color:var(--text)}
    .tree-count{font-size:11px;color:var(--muted);background:var(--bg-hover);padding:2px 8px;border-radius:10px}
    .tree-children{list-style:none;margin-left:24px;display:none}
    .tree-children.expanded{display:block}

    .dept-detail-card{
      background:var(--bg-elev);border:1px solid var(--border);
      border-radius:var(--radius);overflow:hidden;
    }
    .detail-header{
      display:flex;justify-content:space-between;align-items:center;
      padding:20px;border-bottom:1px solid var(--border);
    }
    .detail-title-wrap{display:flex;align-items:center;gap:12px}
    .detail-icon{
      width:48px;height:48px;border-radius:12px;
      background:linear-gradient(135deg,var(--primary),#60A5FA);
      display:flex;align-items:center;justify-content:center;
      font-size:24px;
    }
    .detail-title{font-size:20px;font-weight:600;color:#fff}
    .detail-subtitle{font-size:13px;color:var(--muted);margin-top:4px}
    .detail-actions{display:flex;gap:10px}

    .detail-body{padding:20px}
    .info-grid{
      display:grid;grid-template-columns:repeat(2,1fr);gap:20px;margin-bottom:24px;
    }
    .info-item{
      background:var(--bg);border:1px solid var(--border);
      border-radius:10px;padding:16px;
    }
    .info-label{font-size:12px;color:var(--muted);margin-bottom:8px}
    .info-value{font-size:15px;color:#fff;font-weight:500}

    .section-title{
      font-size:15px;font-weight:600;color:#fff;
      margin-bottom:16px;padding-bottom:12px;
      border-bottom:1px solid var(--border);
    }
    .member-list{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
    .member-card{
      background:var(--bg);border:1px solid var(--border);
      border-radius:10px;padding:16px;
      display:flex;align-items:center;gap:12px;
      transition:.15s;cursor:pointer;
    }
    .member-card:hover{border-color:var(--primary);transform:translateY(-2px)}
    .member-avatar{
      width:44px;height:44px;border-radius:50%;
      background:linear-gradient(135deg,#60A5FA,#3B82F6);
      display:flex;align-items:center;justify-content:center;
      color:#fff;font-weight:600;font-size:16px;
    }
    .member-info{flex:1}
    .member-name{font-size:14px;font-weight:500;color:#fff}
    .member-role{font-size:12px;color:var(--muted)}
    .member-actions{opacity:0;transition:.15s}
    .member-card:hover .member-actions{opacity:1}
    .member-more{
      width:28px;height:28px;border:none;border-radius:6px;
      background:var(--bg-hover);color:var(--muted);
      cursor:pointer;font-size:14px;
    }
    .member-more:hover{color:var(--text)}

    .sub-dept-section{margin-top:24px}
    .sub-dept-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px}
    .sub-dept-card{
      background:var(--bg);border:1px solid var(--border);
      border-radius:10px;padding:16px;
      display:flex;align-items:center;gap:12px;
      cursor:pointer;transition:.15s;
    }
    .sub-dept-card:hover{border-color:var(--primary);background:var(--bg-hover)}
    .sub-dept-icon{
      width:40px;height:40px;border-radius:10px;
      background:linear-gradient(135deg,#60A5FA,#3B82F6);
      display:flex;align-items:center;justify-content:center;
      font-size:18px;
    }
    .sub-dept-info{flex:1}
    .sub-dept-name{font-size:14px;font-weight:500;color:#fff}
    .sub-dept-count{font-size:12px;color:var(--muted)}

    .form-textarea{
      width:100%;min-height:100px;border:1px solid var(--border);
      border-radius:8px;padding:12px;font-size:14px;
      outline:none;background:var(--bg);color:var(--text);resize:vertical;
    }
    .form-textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-light)}

    @media(max-width:1024px){
      .dept-layout{grid-template-columns:1fr}
      .dept-tree-card{display:none}
      .member-list{grid-template-columns:repeat(2,1fr)}
    }
    @media(max-width:768px){
      .member-list{grid-template-columns:1fr}
    }
  </style>
</head>

    // 鏄剧ず閫€鍑鸿彍鍗?    function showLogoutMenu() {
      const menu = document.createElement('div');
      menu.className = 'logout-menu';
      menu.style.cssText = `
        position:fixed;top:60px;right:20px;width:160px;
        background:var(--bg-elev);border:1px solid var(--border);
        border-radius:10px;box-shadow:var(--shadow);z-index:1000;
        overflow:hidden;
      `;
      menu.innerHTML = `
        <div style="padding:12px 16px;border-bottom:1px solid var(--border);font-size:13px;color:var(--muted);">
          褰撳墠鐢ㄦ埛
        </div>
        <div style="padding:12px 16px;font-size:14px;color:var(--text);font-weight:500;" id="menuUsername">
          ${document.getElementById('currentUsername').textContent}
        </div>
        <div style="padding:8px;border-top:1px solid var(--border);">
          <button onclick="logout();document.querySelector('.logout-menu').remove();" 
            style="width:100%;padding:10px;border:none;border-radius:6px;background:transparent;color:var(--danger);font-size:13px;cursor:pointer;text-align:left;">
            馃毆 閫€鍑虹櫥褰?          </button>
        </div>
      `;
      document.body.appendChild(menu);
      
      setTimeout(() => {
        document.addEventListener('click', function closeMenu(e) {
          if (!menu.contains(e.target)) {
            menu.remove();
            document.removeEventListener('click', closeMenu);
          }
        });
      }, 100);
    }
  </script>

    let currentDeptId = 'tech';
    let editingDeptId = null;

    // 娓叉煋鏍戝舰缁撴瀯
    function renderTree() {
      const tree = document.getElementById('deptTree');
      tree.innerHTML = renderTreeNode('root');
    }

    function renderTreeNode(parentId, level = 0) {
      const children = depts.filter(d => d.parent === parentId);
      if (children.length === 0) return '';

      const parent = depts.find(d => d.id === parentId);
      const hasChildren = children.length > 0;
      const isExpanded = level < 1;

      let html = '';
      children.forEach(dept => {
        const subChildren = depts.filter(d => d.parent === dept.id);
        const hasSub = subChildren.length > 0;
        html += `
          <li class="tree-node">
            <div class="tree-item ${dept.id === currentDeptId ? 'active' : ''}" onclick="selectDept('${dept.id}')" data-id="${dept.id}">
              ${hasSub ? `<button class="tree-toggle" onclick="toggleNode(event,this)">${isExpanded ? '鈻? : '鈻?}</button>` : '<span style="width:20px"></span>'}
              <span class="tree-icon">${dept.icon}</span>
              <span class="tree-label">${dept.name}</span>
              <span class="tree-count">${dept.memberCount} 浜?/span>
            </div>
            ${hasSub ? `<ul class="tree-children ${isExpanded ? 'expanded' : ''}">${renderTreeNode(dept.id, level + 1)}</ul>` : ''}
          </li>
        `;
      });
      return html;
    }

    function toggleNode(event, btn) {
      event.stopPropagation();
      const isExpanded = btn.textContent === '鈻?;
      btn.textContent = isExpanded ? '鈻? : '鈻?;
      const children = btn.closest('.tree-node').querySelector('.tree-children');
      if (children) children.classList.toggle('expanded');
    }

    function expandAll() {
      document.querySelectorAll('.tree-children').forEach(c => c.classList.add('expanded'));
      document.querySelectorAll('.tree-toggle').forEach(t => t.textContent = '鈻?);
    }

    function selectDept(id) {
      currentDeptId = id;
      document.querySelectorAll('.tree-item').forEach(i => i.classList.remove('active'));
      const item = document.querySelector(`.tree-item[data-id="${id}"]`);
      if (item) item.classList.add('active');
      renderDetail();
    }

    // 娓叉煋璇︽儏
    function renderDetail() {
      const dept = depts.find(d => d.id === currentDeptId);
      if (!dept) return;

      document.getElementById('detailIcon').textContent = dept.icon;
      document.getElementById('detailTitle').textContent = dept.name;
      document.getElementById('detailSubtitle').textContent = `${dept.desc} 路 鎴愮珛浜?${dept.created}`;

      const parentName = dept.parent ? depts.find(d => d.id === dept.parent)?.name : '鏃?;
      document.getElementById('infoGrid').innerHTML = `
        <div class="info-item"><div class="info-label">閮ㄩ棬缂栧彿</div><div class="info-value">${dept.code}</div></div>
        <div class="info-item"><div class="info-label">閮ㄩ棬璐熻矗浜?/div><div class="info-value">${dept.manager}</div></div>
        <div class="info-item"><div class="info-label">涓婄骇閮ㄩ棬</div><div class="info-value">${parentName}</div></div>
        <div class="info-item"><div class="info-label">鎴愮珛鏃堕棿</div><div class="info-value">${dept.created}</div></div>
        <div class="info-item"><div class="info-label">浜哄憳缂栧埗</div><div class="info-value">${dept.memberCount} 浜?/ ${dept.quota} 浜?/div></div>
        <div class="info-item"><div class="info-label">鍔炲叕鍦扮偣</div><div class="info-value">${dept.location}</div></div>
      `;

      // 瀛愰儴闂?      const subDepts = depts.filter(d => d.parent === dept.id);
      document.getElementById('subDeptSection').innerHTML = subDepts.length > 0 ? `
        <div class="sub-dept-section">
          <div class="section-title">涓嬬骇閮ㄩ棬锛?{subDepts.length}锛?/div>
          <div class="sub-dept-grid">
            ${subDepts.map(d => `
              <div class="sub-dept-card" onclick="selectDept('${d.id}')">
                <div class="sub-dept-icon">${d.icon}</div>
                <div class="sub-dept-info">
                  <div class="sub-dept-name">${d.name}</div>
                  <div class="sub-dept-count">${d.memberCount} 浜?/div>
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      ` : '';

      // 鎴愬憳鍒楄〃锛堟ā鎷燂級
      const members = generateMembers(dept.memberCount);
      document.getElementById('memberSection').innerHTML = `
        <div class="sub-dept-section">
          <div class="section-title">閮ㄩ棬鎴愬憳锛?{dept.memberCount}锛?/div>
          <div class="member-list">
            ${members.slice(0, 9).map(m => `
              <div class="member-card">
                <div class="member-avatar" style="background:${m.color}">${m.name[0]}</div>
                <div class="member-info">
                  <div class="member-name">${m.name}</div>
                  <div class="member-role">${m.role}</div>
                </div>
                <div class="member-actions">
                  <button class="member-more" onclick="showToast('${m.name} - ${m.role}')">鈰?/button>
                </div>
              </div>
            `).join('')}
          </div>
          ${dept.memberCount > 9 ? `<div style="text-align:center;margin-top:20px"><button class="btn btn-sm btn-outline">鏌ョ湅鍏ㄩ儴 ${dept.memberCount} 浜?/button></div>` : ''}
        </div>
      `;
    }

    function generateMembers(count) {
      const names = ['寮犱笁', '鏉庡洓', '鐜嬩簲', '璧靛叚', '閽变竷', '瀛欏叓', '鍛ㄤ節', '鍚村崄', '閮戝崄涓€', '闄堝崄浜?, '鏋楀崄涓?, '榛勫崄鍥?, '鍒樹竴', '闄堜簩', '鏉ㄤ笁'];
      const roles = ['閮ㄩ棬缁忕悊', '鎶€鏈笓瀹?, '楂樼骇宸ョ▼甯?, '宸ョ▼甯?, '鍔╃悊宸ョ▼甯?, '瀹炰範鐢?];
      const colors = ['linear-gradient(135deg,#60A5FA,#3B82F6)', 'linear-gradient(135deg,#FBBF24,#F59E0B)', 'linear-gradient(135deg,#4ADE80,#22C55E)', 'linear-gradient(135deg,#F87171,#EF4444)', 'linear-gradient(135deg,#A78BFA,#8B5CF6)', 'linear-gradient(135deg,#FB7185,#F43F5E)', 'linear-gradient(135deg,#34D399,#10B981)'];
      
      return Array.from({ length: count }, (_, i) => ({
        name: names[i % names.length] + (i >= names.length ? i : ''),
        role: roles[i % roles.length],
        color: colors[i % colors.length]
      }));
    }

    // 寮圭獥
    window.openModal = function(type) {
      editingDeptId = type === 'edit' ? currentDeptId : null;
      document.getElementById('modalTitle').textContent = type === 'add' ? '鏂板閮ㄩ棬' : '缂栬緫閮ㄩ棬';
      
      // 濉厖涓婄骇閮ㄩ棬閫夐」
      const parentSelect = document.getElementById('deptParent');
      parentSelect.innerHTML = '<option value="">璇烽€夋嫨涓婄骇閮ㄩ棬</option>' + 
        depts.map(d => `<option value="${d.id}">${d.name}</option>`).join('');

      if (type === 'edit') {
        const dept = depts.find(d => d.id === currentDeptId);
        if (dept) {
          document.getElementById('deptName').value = dept.name;
          document.getElementById('deptCode').value = dept.code;
          document.getElementById('deptParent').value = dept.parent || '';
          document.getElementById('deptManager').value = dept.manager;
          document.getElementById('deptCreated').value = dept.created;
          document.getElementById('deptQuota').value = dept.quota;
          document.getElementById('deptLocation').value = dept.location;
          document.getElementById('deptDesc').value = dept.desc;
        }
      } else {
        document.getElementById('deptForm').reset();
      }

      ModalManager.open('deptModal');
    };

    function saveDept() {
      const name = document.getElementById('deptName').value.trim();
      const parent = document.getElementById('deptParent').value;
      
      if (!name || !parent) {
        showToast('璇峰～鍐欏繀濉」', 'error');
        return;
      }

      if (editingDeptId) {
        const dept = depts.find(d => d.id === editingDeptId);
        if (dept) {
          dept.name = name;
          dept.code = document.getElementById('deptCode').value;
          dept.parent = parent;
          dept.manager = document.getElementById('deptManager').value;
          dept.created = document.getElementById('deptCreated').value;
          dept.quota = parseInt(document.getElementById('deptQuota').value) || 0;
          dept.location = document.getElementById('deptLocation').value;
          dept.desc = document.getElementById('deptDesc').value;
          showToast('閮ㄩ棬鏇存柊鎴愬姛');
        }
      } else {
        const newDept = {
          id: 'dept_' + Date.now(),
          name,
          code: document.getElementById('deptCode').value || 'DEPT-' + Date.now(),
          parent,
          manager: document.getElementById('deptManager').value || '寰呭垎閰?,
          created: document.getElementById('deptCreated').value || new Date().toISOString().split('T')[0],
          quota: parseInt(document.getElementById('deptQuota').value) || 0,
          location: document.getElementById('deptLocation').value || '寰呭垎閰?,
          desc: document.getElementById('deptDesc').value || name,
          icon: '馃搧',
          memberCount: 0
        };
        depts.push(newDept);
        showToast('閮ㄩ棬鍒涘缓鎴愬姛');
      }

      closeModal('deptModal');
      renderTree();
      renderDetail();
    }

    function deleteDept() {
      const dept = depts.find(d => d.id === currentDeptId);
      if (!dept) return;
      
      const hasChildren = depts.some(d => d.parent === currentDeptId);
      if (hasChildren) {
        showToast('璇ラ儴闂ㄤ笅鏈夊瓙閮ㄩ棬锛屾棤娉曞垹闄?, 'error');
        return;
      }

      confirmAction(`鍒犻櫎閮ㄩ棬銆?{dept.name}銆峘, () => {
        depts = depts.filter(d => d.id !== currentDeptId);
        currentDeptId = 'root';
        renderTree();
        selectDept('root');
        showToast('閮ㄩ棬宸插垹闄?);
      });
    }

    // 鍒濆鍖?    document.addEventListener('DOMContentLoaded', () => {
      renderTree();
      renderDetail();
    });
  </script>
</body>
</html>
