  <style>
    /* 瑙掕壊鏉冮檺涓撶敤鏍峰紡 */
    .role-layout{
      display:grid;grid-template-columns:320px 1fr;gap:20px;
    }
    .role-list-card{
      background:var(--bg-elev);border:1px solid var(--border);
      border-radius:var(--radius);overflow:hidden;
    }
    .list-header{
      display:flex;justify-content:space-between;align-items:center;
      padding:16px;border-bottom:1px solid var(--border);
    }
    .list-title{font-size:15px;font-weight:600;color:#fff}
    .role-list{list-style:none;max-height:calc(100vh - 200px);overflow-y:auto}
    .role-item{
      padding:14px 16px;border-bottom:1px solid var(--border);
      cursor:pointer;transition:.15s;
    }
    .role-item:hover{background:var(--bg-hover)}
    .role-item.active{background:var(--primary-light);border-left:3px solid var(--primary)}
    .role-name{font-size:14px;font-weight:500;color:#fff;margin-bottom:6px}
    .role-desc{font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:8px}
    .role-meta{display:flex;justify-content:space-between;align-items:center}
    .role-count{font-size:11px;color:var(--muted);background:var(--bg-hover);padding:2px 8px;border-radius:10px}
    .role-time{font-size:11px;color:var(--muted)}

    .permission-card{
      background:var(--bg-elev);border:1px solid var(--border);
      border-radius:var(--radius);overflow:hidden;
    }
    .perm-header{
      display:flex;justify-content:space-between;align-items:center;
      padding:20px;border-bottom:1px solid var(--border);
    }
    .perm-title-wrap{display:flex;align-items:center;gap:12px}
    .perm-badge{
      padding:6px 12px;border-radius:20px;font-size:12px;font-weight:500;
      background:var(--primary-light);color:var(--primary);
    }
    .perm-title{font-size:18px;font-weight:600;color:#fff}
    .perm-subtitle{font-size:13px;color:var(--muted);margin-top:4px}
    .perm-actions{display:flex;gap:10px}

    .perm-body{padding:20px}
    .perm-info-grid{
      display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:20px;
    }
    .perm-info-item{
      background:var(--bg);border:1px solid var(--border);
      border-radius:10px;padding:16px;text-align:center;
    }
    .perm-info-num{font-size:24px;font-weight:600;color:var(--primary);margin-bottom:4px}
    .perm-info-label{font-size:12px;color:var(--muted)}

    .perm-module{
      background:var(--bg);border:1px solid var(--border);
      border-radius:10px;margin-bottom:16px;overflow:hidden;
    }
    .module-header{
      display:flex;justify-content:space-between;align-items:center;
      padding:14px 16px;border-bottom:1px solid var(--border);
      cursor:pointer;transition:.15s;
    }
    .module-header:hover{background:var(--bg-hover)}
    .module-title{display:flex;align-items:center;gap:10px;font-size:14px;font-weight:600;color:#fff}
    .module-icon{font-size:16px}
    .module-actions{display:flex;align-items:center;gap:12px}
    .module-check{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted)}
    .module-check input{width:16px;height:16px;cursor:pointer}
    .module-toggle{
      width:24px;height:24px;border:none;border-radius:6px;
      background:var(--bg-hover);color:var(--muted);
      cursor:pointer;font-size:12px;transition:.15s;
    }
    .module-toggle:hover{color:var(--text)}
    .module-permissions{
      padding:12px 16px;display:grid;grid-template-columns:repeat(4,1fr);gap:12px;
    }
    .module-permissions.collapsed{display:none}
    .perm-item{
      display:flex;align-items:center;gap:8px;
      padding:8px 10px;border-radius:6px;
      transition:.15s;
    }
    .perm-item:hover{background:var(--bg-hover)}
    .perm-item input{width:16px;height:16px;cursor:pointer}
    .perm-item label{font-size:13px;color:var(--text);cursor:pointer;flex:1}

    .form-textarea{
      width:100%;min-height:100px;border:1px solid var(--border);
      border-radius:8px;padding:12px;font-size:14px;
      outline:none;background:var(--bg);color:var(--text);resize:vertical;
    }
    .form-textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-light)}

    @media(max-width:1024px){
      .role-layout{grid-template-columns:1fr}
      .role-list-card{display:none}
      .module-permissions{grid-template-columns:repeat(2,1fr)}
    }
    @media(max-width:768px){
      .perm-info-grid{grid-template-columns:1fr}
    }
  </style>

    // 鏄剧ず閫€鍑鸿彍鍗?    function showLogoutMenu() {
      const menu = document.createElement('div');
      menu.className = 'logout-menu';
      menu.style.cssText = `
        position:fixed;top:60px;right:20px;width:160px;
        background:var(--bg-elev);border:1px solid var(--border);
        border-radius:10px;box-shadow:var(--shadow);z-index:1000;
        overflow:hidden;
      `;
      menu.innerHTML = `
        <div style="padding:12px 16px;border-bottom:1px solid var(--border);font-size:13px;color:var(--muted);">
          褰撳墠鐢ㄦ埛
        </div>
        <div style="padding:12px 16px;font-size:14px;color:var(--text);font-weight:500;" id="menuUsername">
          ${document.getElementById('currentUsername').textContent}
        </div>
        <div style="padding:8px;border-top:1px solid var(--border);">
          <button onclick="logout();document.querySelector('.logout-menu').remove();" 
            style="width:100%;padding:10px;border:none;border-radius:6px;background:transparent;color:var(--danger);font-size:13px;cursor:pointer;text-align:left;">
            馃毆 閫€鍑虹櫥褰?          </button>
        </div>
      `;
      document.body.appendChild(menu);
      
      setTimeout(() => {
        document.addEventListener('click', function closeMenu(e) {
          if (!menu.contains(e.target)) {
            menu.remove();
            document.removeEventListener('click', closeMenu);
          }
        });
      }, 100);
    }
  </script>

    // 娓叉煋瑙掕壊鍒楄〃
    function renderRoleList() {
      const list = document.getElementById('roleList');
      document.getElementById('roleCount').textContent = `鍏?${roles.length} 涓鑹瞏;
      
      list.innerHTML = roles.map(role => `
        <li class="role-item ${role.id === currentRoleId ? 'active' : ''}" onclick="selectRole('${role.id}')" data-id="${role.id}">
          <div class="role-name">${role.name}</div>
          <div class="role-desc">${role.desc}</div>
          <div class="role-meta">
            <span class="role-count">${role.userCount} 浜?/span>
            <span class="role-time">${role.created}</span>
          </div>
        </li>
      `).join('');
    }

    function selectRole(id) {
      currentRoleId = id;
      document.querySelectorAll('.role-item').forEach(i => i.classList.remove('active'));
      const item = document.querySelector(`.role-item[data-id="${id}"]`);
      if (item) item.classList.add('active');
      renderPermissionPanel();
    }

    // 娓叉煋鏉冮檺闈㈡澘
    function renderPermissionPanel() {
      const role = roles.find(r => r.id === currentRoleId);
      if (!role) return;

      document.getElementById('roleType').textContent = role.type === 'system' ? '绯荤粺鍐呯疆' : '鑷畾涔?;
      document.getElementById('permTitle').textContent = role.name.replace(/^[^\s]+\s/, '');
      document.getElementById('permSubtitle').textContent = `${role.desc} 路 ${role.userCount} 浜哄湪鐢╜;

      const perms = rolePermissions[currentRoleId] || [];
      const totalPerms = permModules.reduce((sum, m) => sum + m.perms.length, 0);
      
      document.getElementById('moduleCount').textContent = permModules.length;
      document.getElementById('permItemCount').textContent = totalPerms;
      document.getElementById('permPercent').textContent = Math.round((perms.length / totalPerms) * 100) + '%';

      document.getElementById('permModules').innerHTML = permModules.map((module, idx) => {
        const moduleChecked = module.perms.every(p => perms.includes(p.id));
        const modulePartial = module.perms.some(p => perms.includes(p.id)) && !moduleChecked;
        
        return `
          <div class="perm-module">
            <div class="module-header" onclick="toggleModule(this)">
              <div class="module-title">
                <span class="module-icon">${module.icon}</span>
                <span>${module.name}</span>
              </div>
              <div class="module-actions">
                <label class="module-check">
                  <input type="checkbox" ${moduleChecked ? 'checked' : ''} ${modulePartial ? 'indeterminate' : ''} 
                    onclick="event.stopPropagation();toggleAllInModule(this, '${module.id}')" />
                  <span>鍏ㄩ€?/span>
                </label>
                <button class="module-toggle">鈻?/button>
              </div>
            </div>
            <div class="module-permissions">
              ${module.perms.map(p => `
                <div class="perm-item">
                  <input type="checkbox" id="${p.id}" ${perms.includes(p.id) ? 'checked' : ''} 
                    onchange="updatePermission('${p.id}', this.checked)" />
                  <label for="${p.id}">${p.name}</label>
                </div>
              `).join('')}
            </div>
          </div>
        `;
      }).join('');
    }

    function toggleModule(header) {
      const permissions = header.nextElementSibling;
      const toggle = header.querySelector('.module-toggle');
      const isCollapsed = permissions.classList.contains('collapsed');
      permissions.classList.toggle('collapsed');
      toggle.textContent = isCollapsed ? '鈻? : '鈻?;
    }

    function toggleAllInModule(checkbox, moduleId) {
      const module = permModules.find(m => m.id === moduleId);
      if (!module) return;

      const perms = rolePermissions[currentRoleId] || [];
      if (checkbox.checked) {
        module.perms.forEach(p => {
          if (!perms.includes(p.id)) perms.push(p.id);
        });
      } else {
        rolePermissions[currentRoleId] = perms.filter(id => !module.perms.some(p => p.id === id));
      }
      
      renderPermissionPanel();
      showToast(checkbox.checked ? '宸插叏閫夎妯″潡鏉冮檺' : '宸插彇娑堣妯″潡鏉冮檺');
    }

    function updatePermission(permId, checked) {
      let perms = rolePermissions[currentRoleId] || [];
      if (checked) {
        if (!perms.includes(permId)) perms.push(permId);
      } else {
        perms = perms.filter(id => id !== permId);
      }
      rolePermissions[currentRoleId] = perms;
      
      // 鏇存柊鐧惧垎姣?      const totalPerms = permModules.reduce((sum, m) => sum + m.perms.length, 0);
      document.getElementById('permPercent').textContent = Math.round((perms.length / totalPerms) * 100) + '%';
    }

    // 寮圭獥
    window.openModal = function(type) {
      editingRoleId = type === 'edit' ? currentRoleId : null;
      document.getElementById('modalTitle').textContent = type === 'add' ? '鏂板瑙掕壊' : '缂栬緫瑙掕壊';
      
      if (type === 'edit') {
        const role = roles.find(r => r.id === currentRoleId);
        if (role) {
          document.getElementById('roleName').value = role.name.replace(/^[^\s]+\s/, '');
          document.getElementById('roleCode').value = role.code;
          document.getElementById('roleDesc').value = role.desc;
        }
      } else {
        document.getElementById('roleForm').reset();
      }
      
      ModalManager.open('roleModal');
    };

    function saveRole() {
      const name = document.getElementById('roleName').value.trim();
      if (!name) {
        showToast('璇疯緭鍏ヨ鑹插悕绉?, 'error');
        return;
      }

      if (editingRoleId) {
        const role = roles.find(r => r.id === editingRoleId);
        if (role) {
          role.name = (role.name.match(/^[^\s]+/) || ['馃懁'])[0] + ' ' + name;
          role.code = document.getElementById('roleCode').value;
          role.desc = document.getElementById('roleDesc').value;
          showToast('瑙掕壊鏇存柊鎴愬姛');
        }
      } else {
        const newRole = {
          id: 'role_' + Date.now(),
          name: '馃懁 ' + name,
          code: document.getElementById('roleCode').value || 'custom_' + Date.now(),
          desc: document.getElementById('roleDesc').value || name,
          type: 'custom',
          userCount: 0,
          created: new Date().toISOString().split('T')[0]
        };
        roles.push(newRole);
        rolePermissions[newRole.id] = [];
        currentRoleId = newRole.id;
        showToast('瑙掕壊鍒涘缓鎴愬姛');
      }

      closeModal('roleModal');
      renderRoleList();
      renderPermissionPanel();
    }

    function copyRole() {
      const role = roles.find(r => r.id === currentRoleId);
      if (!role) return;

      const newRole = {
        id: 'role_' + Date.now(),
        name: role.name + ' (澶嶅埗)',
        code: role.code + '_copy',
        desc: role.desc,
        type: 'custom',
        userCount: 0,
        created: new Date().toISOString().split('T')[0]
      };
      roles.push(newRole);
      rolePermissions[newRole.id] = [...(rolePermissions[currentRoleId] || [])];
      currentRoleId = newRole.id;
      
      renderRoleList();
      renderPermissionPanel();
      showToast('瑙掕壊宸插鍒?);
    }

    function deleteRole() {
      const role = roles.find(r => r.id === currentRoleId);
      if (!role) return;

      if (role.type === 'system') {
        showToast('绯荤粺鍐呯疆瑙掕壊涓嶅彲鍒犻櫎', 'error');
        return;
      }
      if (role.userCount > 0) {
        showToast('璇ヨ鑹蹭笅杩樻湁鐢ㄦ埛锛屾棤娉曞垹闄?, 'error');
        return;
      }

      confirmAction(`鍒犻櫎瑙掕壊銆?{role.name}銆峘, () => {
        roles = roles.filter(r => r.id !== currentRoleId);
        delete rolePermissions[currentRoleId];
        currentRoleId = roles[0]?.id || 'admin';
        renderRoleList();
        renderPermissionPanel();
        showToast('瑙掕壊宸插垹闄?);
      });
    }

    // 鍒濆鍖?    document.addEventListener('DOMContentLoaded', () => {
      renderRoleList();
      renderPermissionPanel();
    });
  </script>
</body>
</html>
