<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Enterprise Management System Demo</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0F172A; color: #fff; padding: 40px; }
        h1 { text-align: center; margin-bottom: 40px; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(800px, 1fr)); gap: 30px; }
        .shot { background: #1E293B; border-radius: 12px; overflow: hidden; }
        .shot img { width: 100%; display: block; }
        .shot-title { padding: 16px; font-size: 14px; color: #94A3B8; }
    </style>
</head>
<body>
    <h1>Enterprise Management System Demo</h1>
    <div class="gallery">        <div class='shot'><img src='01_login_dark.png' alt='Login page - Dark mode'><div class='shot-title'>Login page - Dark mode</div></div>
        <div class='shot'><img src='02_login_light.png' alt='Login page - Light mode (click theme toggle)'><div class='shot-title'>Login page - Light mode (click theme toggle)</div></div>
        <div class='shot'><img src='03_login_form.png' alt='Login form with credentials'><div class='shot-title'>Login form with credentials</div></div>
        <div class='shot'><img src='04_dashboard.png' alt='Dashboard after login'><div class='shot-title'>Dashboard after login</div></div>
        <div class='shot'><img src='05_user_mgmt.png' alt='User Management page'><div class='shot-title'>User Management page</div></div>
        <div class='shot'><img src='06_user_add.png' alt='Add User modal'><div class='shot-title'>Add User modal</div></div>
        <div class='shot'><img src='07_dept.png' alt='Department page'><div class='shot-title'>Department page</div></div>
        <div class='shot'><img src='08_role.png' alt='Role Permission page'><div class='shot-title'>Role Permission page</div></div>
        <div class='shot'><img src='09_logout.png' alt='Logout menu'><div class='shot-title'>Logout menu</div></div>
    </div>
</body>
</html>
